<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar_title">
            <h1>Projects</h1>
        </div>
        <div class="side">
        </div>
        <div class="add">
              <button class="project_button" >+ Add new Project</button>
            </div>
            <div class="project_form" id="myForm">
                <form action="" class="formContainer">
                     <h1>Add Project</h1>
                    <label for="project">Project Title:</label>
                    <input type="text" id="project" name="project" required>
                    <button type="submit" class="btn">Add Project</button>
                    <button type="button" class="btn_cancel">Close</button>
                </form>
            </div>
    </div>
    <div class="main">
        <h1 class="main_title">Add a project...</h1>
        <div class="content">

        </div>
        <div class="task_form" id="form">
                <form action="" class="formListContainer">
                     <h1>Add Task</h1>
                    <label for="task">Task Title:</label>
                    <input type="text" id="task" name="task" required>
                    <label for="date">Due Date:</label> 
                    <input type="date" id="date" name="date" required>
                    <label for="priority">priority:</label>
                    <select name="priority" id="priority"required>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                    <label for="info">Description:</label>
                    <textarea name="info" id="info" rows="5"></textarea>
                    <div>
                        <button type="submit" class="taskBtn">Add Task</button>
                        <button type="button" class="task_cancel">Close</button>
                        <div id="error"></div>
                    </div>
                    
                </form>
            </div>
        <div class="hide"> 
            <button class="task_button">+ Add New task</button>
        </div>
    </div>
    </div>
   
</body>
</html>
